services:
  voice-relay:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - whisper_cache:/root/.cache/huggingface
      - ${WIKI_HOST_PATH:-/opt/butler-memory}:/data/wiki
      - ${DOCS_HOST_PATH:-/opt/butler-documents}:/data/docs
    restart: unless-stopped

  caddy:
    image: caddy:2
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - voice-relay
    restart: unless-stopped

volumes:
  whisper_cache:
  caddy_data:
  caddy_config:
